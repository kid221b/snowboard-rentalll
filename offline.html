<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - 冰雪之巅</title>
    <meta name="theme-color" content="#4a90e2">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #4a90e2 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        .icon {
            font-size: 6rem;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 24px;
            opacity: 0.95;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid #fff;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #fff;
            color: #4a90e2;
        }
        .hint {
            margin-top: 32px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⛷️</div>
        <h1>网络好像断开了</h1>
        <p>当前没有可用的网络连接。<br>已加载的页面可以继续浏览，但部分功能可能受限。</p>
        <div class="actions">
            <button onclick="location.reload()">🔄 重新加载</button>
            <button onclick="history.length > 1 ? history.back() : location.href='./'">🏠 回到首页</button>
        </div>
        <p class="hint">提示：浏览过的页面会缓存在你的设备上，断网时仍可访问。</p>
    </div>
</body>
</html>
